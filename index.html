<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Album</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

#fullscreenVideo{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:contain;
background:black;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<video id="fullscreenVideo" playsinline webkit-playsinline autoplay></video>

<a-scene
mindar-image="imageTargetSrc: ./targets (1).mind; maxTrack: 5;"
color-space="sRGB"
renderer="colorManagement: true"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<a-assets></a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

</a-scene>

<script>

const fullscreenVideo = document.getElementById("fullscreenVideo");
const scene = document.querySelector("a-scene");

function playVideo(name){
fullscreenVideo.src = `./videos/${name}.mp4`;
fullscreenVideo.style.display="block";
fullscreenVideo.play().catch(()=>{});
}

function stopVideo(){
fullscreenVideo.pause();
fullscreenVideo.currentTime = 0;
fullscreenVideo.style.display="none";
}

/* TARGET 1 */

const target0=document.createElement("a-entity");
target0.setAttribute("mindar-image-target","targetIndex:0");

target0.addEventListener("targetFound",()=>{
playVideo("001");
});

target0.addEventListener("targetLost",()=>{
stopVideo();
});

scene.appendChild(target0);

/* TARGET 2 */

const target1=document.createElement("a-entity");
target1.setAttribute("mindar-image-target","targetIndex:1");

target1.addEventListener("targetFound",()=>{
playVideo("002");
});

target1.addEventListener("targetLost",()=>{
stopVideo();
});

scene.appendChild(target1);

/* TARGET 3 */

const target2=document.createElement("a-entity");
target2.setAttribute("mindar-image-target","targetIndex:2");

target2.addEventListener("targetFound",()=>{
playVideo("003");
});

target2.addEventListener("targetLost",()=>{
stopVideo();
});

scene.appendChild(target2);

/* TARGET 4 */

const target3=document.createElement("a-entity");
target3.setAttribute("mindar-image-target","targetIndex:3");

target3.addEventListener("targetFound",()=>{
playVideo("004");
});

target3.addEventListener("targetLost",()=>{
stopVideo();
});

scene.appendChild(target3);

/* TARGET 5 */

const target4=document.createElement("a-entity");
target4.setAttribute("mindar-image-target","targetIndex:4");

target4.addEventListener("targetFound",()=>{
playVideo("005");
});

target4.addEventListener("targetLost",()=>{
stopVideo();
});

scene.appendChild(target4);

</script>

</body>
</html>
