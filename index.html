<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Album</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
#fullscreenVideo{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
object-fit:contain;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<video id="fullscreenVideo" autoplay playsinline></video>

<!-- SCENE 1 -->
<a-scene mindar-image="imageTargetSrc: ./targets (1).mind; maxTrack:5;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
<a-entity mindar-image-target="targetIndex:0"></a-entity>
</a-scene>

<!-- SCENE 2 -->
<a-scene mindar-image="imageTargetSrc: ./targets (2).mind; maxTrack:5;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
<a-entity mindar-image-target="targetIndex:0"></a-entity>
</a-scene>

<!-- SCENE 3 -->
<a-scene mindar-image="imageTargetSrc: ./targets (3).mind; maxTrack:5;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
<a-entity mindar-image-target="targetIndex:0"></a-entity>
</a-scene>

<!-- SCENE 4 -->
<a-scene mindar-image="imageTargetSrc: ./targets (4).mind; maxTrack:5;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
<a-entity mindar-image-target="targetIndex:0"></a-entity>
</a-scene>

<!-- SCENE 5 -->
<a-scene mindar-image="imageTargetSrc: ./targets (5).mind; maxTrack:5;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
<a-entity mindar-image-target="targetIndex:0"></a-entity>
</a-scene>

<script>

const video=document.getElementById("fullscreenVideo")

function playVideo(name){
video.src="./videos/"+name+".mp4"
video.style.display="block"
video.play()
}

function stopVideo(){
video.pause()
video.currentTime=0
video.style.display="none"
}

document.addEventListener("targetFound",()=>{
playVideo("001")
})

document.addEventListener("targetLost",()=>{
stopVideo()
})

</script>

</body>
</html>
