<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Album</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

#videoPlayer{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:contain;
background:black;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<video id="videoPlayer" autoplay playsinline></video>

<script>

const video=document.getElementById("videoPlayer")

function playVideo(name){
video.src="./videos/"+name+".mp4"
video.style.display="block"
video.play()
}

function stopVideo(){
video.pause()
video.currentTime=0
video.style.display="none"
}

</script>

<!-- TARGET FILE 1 -->

<a-scene mindar-image="imageTargetSrc: ./targets (1).mind; maxTrack:1;"
embedded vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0"
event-set__enter="_event: targetFound; _target: #videoPlayer"
></a-entity>

</a-scene>

<script>
document.querySelectorAll("[mindar-image-target]")[0].addEventListener("targetFound",()=>{
playVideo("001")
})
</script>
